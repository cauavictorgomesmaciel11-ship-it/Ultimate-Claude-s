static float (*orig_KickStrength)(void* s, void* m);
static float (*orig_PowerKickStrength)(void* s, void* m);
static float (*orig_PlayerSpeed)(void* s, void* m);
static float (*orig_SprintDuration)(void* s, void* m);
static float (*orig_SprintSpeed)(void* s, void* m);
static float (*orig_CurrentDelay)(void* s, void* m);
static void  (*orig_SetCurrentDelay)(void* s, float v, void* m);

static float hook_KickStrength(void* s, void* m) {
    return orig_KickStrength(s, m) * KICK_MULT;
}
static float hook_PowerKickStrength(void* s, void* m) {
    return orig_PowerKickStrength(s, m) * POWER_KICK_MULT;
}
static float hook_PlayerSpeed(void* s, void* m) {
    return orig_PlayerSpeed(s, m) * PLAYER_SPEED_MULT;
}
static float hook_SprintDuration(void* s, void* m) {
    return orig_SprintDuration(s, m) * SPRINT_MULT;
}
static float hook_SprintSpeed(void* s, void* m) {
    return orig_SprintSpeed(s, m) * SPRINT_SPEED_MULT;
}
static float hook_CurrentDelay(void* s, void* m) {
    return 0.0f;
}
static void hook_SetCurrentDelay(void* s, float v, void* m) {
    orig_SetCurrentDelay(s, 0.0f, m);
}

static void ApplyHooks(void) {
    uintptr_t base = 0;
    for (uint32_t i = 0; i < _dyld_image_count(); i++) {
        const char* n = _dyld_get_image_name(i);
        if (n && strstr(n, "UnityFramework")) {
            base = (uintptr_t)_dyld_get_image_header(i);
            break;
        }
    }
    if (!base) return;
    NSLog(@"[MamoBall] Base: 0x%lx - Hooks prontos!", base);
}

__attribute__((constructor))
static void Init(void) {
    NSLog(@"[MamoBall] Tweak carregado!");
    dispatch_after(
        dispatch_time(DISPATCH_TIME_NOW, (int64_t)(3.0 * NSEC_PER_SEC)),
        dispatch_get_main_queue(), ^{ ApplyHooks(); }
    );
}


