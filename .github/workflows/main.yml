name: Build MamoBall Dylib
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build dylib
      run: |
        clang -arch arm64 -shared -fobjc-arc -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -miphoneos-version-min=15.0 -framework Foundation -framework UIKit -lobjc -o MamoBall_Ultimate.dylib MamoBall_Ultimate.m
        ls -lh MamoBall_Ultimate.dylib
    - uses: actions/upload-artifact@v4
      with:
        name: MamoBall_dylib
        path: MamoBall_Ultimate.dylib
